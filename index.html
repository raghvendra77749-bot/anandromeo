<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAND GFX | Pro Thumbnail Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #080808; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            background: #121212; 
            padding: 40px 20px; 
            border-radius: 30px; 
            border: 1px solid #222; 
            max-width: 450px; 
            margin: 40px auto; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        h1 { 
            color: #ffcc00; 
            font-size: 32px; 
            margin-bottom: 5px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        .dev-name { 
            font-size: 12px; 
            color: #555; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        input { 
            padding: 16px; 
            width: 85%; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            outline: none; 
            font-size: 15px;
            margin-bottom: 15px;
        }
        .btn-gen { 
            padding: 16px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 93%; 
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-gen:hover { transform: translateY(-2px); background: #f0c000; }

        #result-area { display: none; margin-top: 30px; }
        #thumb-preview { width: 100%; border-radius: 15px; border: 1px solid #333; }

        .btn-download { 
            display: inline-block;
            background: #fff; 
            color: #000; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            margin-top: 15px;
            width: 85%;
            cursor: pointer;
            border: none;
        }

        .donate-box {
            margin-top: 40px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 20px;
        }
        .btn-donate {
            background: transparent;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        #qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .qr-content {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            color: #000;
        }
        .qr-content img { width: 200px; height: 200px; }
        .close-btn {
            margin-top: 25px;
            color: #ffcc00;
            cursor: pointer;
            border: 1px solid #ffcc00;
            padding: 8px 20px;
            border-radius: 20px;
        }
        .footer { margin-top: 50px; color: #333; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ANAND GFX</h1>
        <div class="dev-name">Developed by Raghvendra Singh</div>
        
        <input type="text" id="yt-link" placeholder="YouTube link paste karein...">
        <button class="btn-gen" onclick="getThumb()">GENERATE THUMBNAIL</button>
        
        <div id="result-area">
            <img id="thumb-preview" crossorigin="anonymous" src="" alt="Thumbnail Preview">
            <button class="btn-download" onclick="downloadImage()">DOWNLOAD HD IMAGE</button>
        </div>

        <div class="donate-box">
            <p style="color:#777; font-size: 13px; margin-bottom: 15px;">Support my work!</p>
            <button class="btn-donate" onclick="toggleModal(true)">SUPPORT ANAND GFX</button>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-content">
            <p style="font-weight:bold; font-size: 20px;">Scan to Pay</p>
            <p style="font-size: 14px; color: #666;">Raghvendra Singh</p>
            <img id="upi-qr-img" src="" alt="UPI QR">
            <p style="font-size: 12px; margin-top: 10px; color: #888;">raghvendra29@fam</p>
        </div>
        <div class="close-btn" onclick="toggleModal(false)">CLOSE</div>
    </div>

    <div class="footer">© 2026 ANAND GFX | PALI, RAJASTHAN</div>

    <canvas id="download-canvas" style="display:none;"></canvas>

    <script>
        const MY_UPI = "raghvendra29@fam";
        let currentThumbUrl = "";

        function getThumb() {
            let url = document.getElementById('yt-link').value;
            let id = "";
            
            if(url.includes("v=")) { id = url.split("v=")[1].substring(0, 11); }
            else if(url.includes("be/")) { id = url.split("be/")[1].substring(0, 11); }

            if(id != "") {
                // Using img.youtube.com for better access
                currentThumbUrl = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                let preview = document.getElementById('thumb-preview');
                preview.src = currentThumbUrl;
                document.getElementById('result-area').style.display = "block";
            } else {
                alert("Bhai, sahi link dalo!");
            }
        }

        async function downloadImage() {
            const image = document.getElementById('thumb-preview');
            const canvas = document.getElementById('download-canvas');
            const ctx = canvas.getContext('2d');

            try {
                // Image ko fetch karna taaki browser block na kare
                const response = await fetch(image.src);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const tempImg = new Image();
                tempImg.crossOrigin = "anonymous";
                tempImg.onload = function() {
                    canvas.width = tempImg.width;
                    canvas.height = tempImg.height;
                    ctx.drawImage(tempImg, 0, 0);
                    
                    const link = document.createElement('a');
                    link.download = 'AnandGFX_Thumbnail.jpg';
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                };
                tempImg.src = blobUrl;
            } catch (e) {
                // Backup method if fetch fails
                window.open(currentThumbUrl, '_blank');
                alert("Download start nahi hua toh image par long-press karke save kar lein!");
            }
        }

        function toggleModal(show) {
            if(show) {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=${MY_UPI}%26pn=Raghvendra%20Singh%26cu=INR`;
                document.getElementById('upi-qr-img').src = qrUrl;
            }
            document.getElementById('qr-modal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
