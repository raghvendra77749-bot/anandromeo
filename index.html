<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAND GFX | Pro Thumbnail Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Theme by Raghvendra Singh */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #080808; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            background: #121212; 
            padding: 40px 20px; 
            border-radius: 30px; 
            border: 1px solid #222; 
            max-width: 450px; 
            margin: 40px auto; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        h1 { 
            color: #ffcc00; 
            font-size: 32px; 
            margin-bottom: 5px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        .dev-name { 
            font-size: 12px; 
            color: #555; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        input { 
            padding: 16px; 
            width: 85%; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            outline: none; 
            font-size: 15px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        
        .btn-gen { 
            padding: 16px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 93%; 
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-gen:hover { transform: translateY(-2px); background: #f0c000; }

        #result-area { display: none; margin-top: 30px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #thumb-preview { width: 100%; border-radius: 15px; border: 1px solid #333; }

        .btn-download { 
            display: inline-block;
            background: #fff; 
            color: #000; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            margin-top: 15px;
            width: 85%;
            font-size: 14px;
        }

        /* Donation Section */
        .donate-box {
            margin-top: 40px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 20px;
        }
        .btn-donate {
            background: transparent;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-donate:hover { background: #ffcc00; color: #000; }

        /* QR Modal */
        #qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .qr-content {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            color: #000;
            box-shadow: 0 0 30px rgba(255,204,0,0.3);
        }
        .qr-content img { width: 200px; height: 200px; }
        .qr-content p { margin: 15px 0 5px; font-weight: 700; font-size: 18px; }
        .upi-text { font-size: 12px; color: #666; font-family: monospace; }
        .close-btn {
            margin-top: 25px;
            color: #ffcc00;
            cursor: pointer;
            font-weight: 600;
            border: 1px solid #ffcc00;
            padding: 8px 20px;
            border-radius: 20px;
        }

        .footer { margin-top: 50px; color: #333; font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ANAND GFX</h1>
        <div class="dev-name">Developed by Raghvendra Singh</div>
        
        <input type="text" id="yt-link" placeholder="Paste YouTube link here...">
        <button class="btn-gen" onclick="getThumb()">GENERATE THUMBNAIL</button>
        
        <div id="result-area">
            <img id="thumb-preview" src="" alt="Thumbnail Preview">
            <a id="download-link" class="btn-download" href="#" download="Anand_GFX_Thumb.jpg">DOWNLOAD HD IMAGE</a>
        </div>

        <div class="donate-box">
            <p style="color:#777; font-size: 13px; margin-bottom: 15px;">Kaam pasand aaya toh support karein!</p>
            <button class="btn-donate" onclick="toggleModal(true)">SUPPORT ANAND GFX</button>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-content">
            <p>Scan to Pay</p>
            <div class="upi-text" style="margin-bottom: 15px;">Raghvendra Singh</div>
            <img id="upi-qr-img" src="" alt="Loading QR...">
            <div class="upi-text" id="upi-id-display" style="margin-top: 10px;">raghvendra29@fam</div>
        </div>
        <div class="close-btn" onclick="toggleModal(false)">CLOSE</div>
    </div>

    <div class="footer">© 2026 ANAND GFX | RAJASTHAN, INDIA</div>

    <script>
        const MY_UPI = "raghvendra29@fam";
        const MY_NAME = "Raghvendra Singh";

        function getThumb() {
            let url = document.getElementById('yt-link').value;
            let id = "";
            
            // Extract Video ID
            if(url.includes("v=")) { id = url.split("v=")[1].substring(0, 11); }
            else if(url.includes("be/")) { id = url.split("be/")[1].substring(0, 11); }

            if(id != "") {
                let imgPath = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                document.getElementById('thumb-preview').src = imgPath;
                document.getElementById('download-link').href = imgPath;
                document.getElementById('result-area').style.display = "block";
            } else {
                alert("Bhai, valid YouTube link dalo!");
            }
        }

        function toggleModal(show) {
            if(show) {
                // Generate QR dynamically with your ID
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=${MY_UPI}%26pn=${encodeURIComponent(MY_NAME)}%26cu=INR`;
                document.getElementById('upi-qr-img').src = qrUrl;
            }
            document.getElementById('qr-modal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
