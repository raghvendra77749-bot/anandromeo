<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAND GFX | Professional Thumbnail Downloader</title>
    <style>
        /* Modern Dark Theme by Raghvendra Singh */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0d0d0d; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            background: #1a1a1a; 
            padding: 40px 20px; 
            border-radius: 25px; 
            border: 2px solid #ffcc00; 
            max-width: 600px; 
            margin: 50px auto; 
            box-shadow: 0 15px 35px rgba(255, 204, 0, 0.1);
        }
        h1 { 
            color: #ffcc00; 
            font-size: 32px; 
            margin-bottom: 5px; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .dev-name { 
            font-size: 14px; 
            color: #888; 
            margin-bottom: 30px; 
            font-style: italic;
        }
        input { 
            padding: 15px; 
            width: 85%; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #252525; 
            color: #fff; 
            outline: none; 
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #ffcc00; }
        .btn-gen { 
            padding: 15px 30px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
            width: 90%; 
            font-size: 16px;
            text-transform: uppercase;
        }
        .btn-gen:hover { background: #e6b800; transform: translateY(-2px); }
        
        #result-area { display: none; margin-top: 35px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        img { 
            width: 100%; 
            border-radius: 15px; 
            border: 2px solid #333; 
            margin-bottom: 20px; 
        }
        .btn-download { 
            display: block; 
            background: #ffffff; 
            color: #000; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            width: 85%; 
            margin: 10px auto; 
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn-download:hover { background: #cccccc; }
        .footer { margin-top: 60px; color: #444; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ANAND GFX</h1>
        <div class="dev-name">Developed by Raghvendra Singh</div>
        <p style="color: #bbb;">Download any YouTube Thumbnail in Ultra HD</p>
        
        <input type="text" id="yt-url" placeholder="Paste YouTube Video Link here...">
        <button class="btn-gen" onclick="generate()">Show Thumbnail</button>
        
        <div id="result-area">
            <img id="thumb-preview" src="" alt="Thumbnail Preview">
            <button class="btn-download" onclick="forceDownload()">⬇ DOWNLOAD TO FILES</button>
        </div>
    </div>

    <div class="footer">
        © 2026 ANAND GFX | ALL RIGHTS RESERVED
    </div>

    <script>
        let imgUrl = "";

        function generate() {
            let url = document.getElementById('yt-url').value;
            let videoId = "";
            
            // Logic to extract Video ID
            if(url.includes("v=")) {
                videoId = url.split("v=")[1].substring(0, 11);
            } else if(url.includes("be/")) {
                videoId = url.split("be/")[1].substring(0, 11);
            }
            
            if(videoId) {
                imgUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                document.getElementById('thumb-preview').src = imgUrl;
                document.getElementById('result-area').style.display = "block";
            } else {
                alert("Bhai, sahi link dalo tabhi toh maza aayega!");
            }
        }

        // Professional Force Download Function
        async function forceDownload() {
            try {
                const response = await fetch(imgUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = 'Anand-GFX-Thumbnail.jpg'; 
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                // Fallback for some browsers
                window.open(imgUrl, '_blank');
            }
        }
    </script>
</body>
</html>
