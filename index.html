<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAND GFX | Thumbnail Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Theme by Raghvendra Singh */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0a0a0a; 
            color: #ffffff; 
            text-align: center; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            background: #151515; 
            padding: 40px 20px; 
            border-radius: 30px; 
            border: 1px solid #333; 
            max-width: 500px; 
            margin: 40px auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { 
            color: #ffcc00; 
            font-size: 35px; 
            margin-bottom: 5px; 
            font-weight: 800;
            letter-spacing: -1px;
        }
        .dev-name { 
            font-size: 13px; 
            color: #666; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        input { 
            padding: 18px; 
            width: 85%; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #202020; 
            color: #fff; 
            outline: none; 
            font-size: 15px;
            margin-bottom: 15px;
        }
        input:focus { border-color: #ffcc00; }
        
        .btn-gen { 
            padding: 16px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 93%; 
            font-size: 15px;
            transition: 0.3s;
        }
        .btn-gen:hover { transform: scale(1.02); background: #f0c000; }

        #result-area { display: none; margin-top: 30px; }
        #thumb-preview { width: 100%; border-radius: 15px; border: 2px solid #333; }

        .btn-download { 
            display: inline-block;
            background: #fff; 
            color: #000; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            margin-top: 15px;
            width: 85%;
        }

        /* Donation Section */
        .donate-box {
            margin-top: 40px;
            padding: 20px;
            border: 1px dashed #444;
            border-radius: 20px;
        }
        .btn-donate {
            background: #222;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* QR Modal */
        #qr-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .qr-content {
            background: #fff;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            color: #000;
        }
        .qr-content img { width: 220px; height: 220px; border-radius: 10px; }
        .close-btn {
            margin-top: 20px;
            color: #fff;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ANAND GFX</h1>
        <div class="dev-name">By Raghvendra Singh</div>
        
        <input type="text" id="yt-link" placeholder="YouTube link paste karein...">
        <button class="btn-gen" onclick="getThumb()">GENERATE THUMBNAIL</button>
        
        <div id="result-area">
            <img id="thumb-preview" src="" alt="Thumbnail">
            <a id="download-link" class="btn-download" href="#" download="AnandGFX_Thumbnail.jpg">DOWNLOAD HD</a>
        </div>

        <div class="donate-box">
            <p style="color:#888; font-size: 13px;">Support My Work</p>
            <button class="btn-donate" onclick="toggleModal(true)">GIVE A TIP ☕</button>
        </div>
    </div>

    <div id="qr-modal">
        <div class="qr-content">
            <p style="margin-bottom: 15px; font-weight: 700;">Scan to Pay</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=7665261158@ptaxis%26pn=Raghvendra%20Singh%26cu=INR" alt="UPI QR">
            <p style="font-size: 12px; margin-top: 10px; color: #555;">UPI ID: 7665261158@ptaxis</p>
        </div>
        <div class="close-btn" onclick="toggleModal(false)">BACK TO SITE</div>
    </div>

    <script>
        function getThumb() {
            let url = document.getElementById('yt-link').value;
            let id = "";
            if(url.includes("v=")) { id = url.split("v=")[1].substring(0, 11); }
            else if(url.includes("be/")) { id = url.split("be/")[1].substring(0, 11); }

            if(id != "") {
                let highRes = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                document.getElementById('thumb-preview').src = highRes;
                document.getElementById('download-link').href = highRes;
                document.getElementById('result-area').style.display = "block";
            } else {
                alert("Bhai link galat hai!");
            }
        }

        function toggleModal(show) {
            document.getElementById('qr-modal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
